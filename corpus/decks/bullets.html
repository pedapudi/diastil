<!doctype html>
<html><head><meta charset="utf-8"><style>
body { margin: 0; font-family: Georgia, serif; }
.slide { width: 1280px; height: 720px; padding: 48px; box-sizing: border-box; }
h1 { font-size: 44px; }
ul.custom { list-style: none; padding: 0; }
ul.custom li { padding-left: 1.2em; position: relative; margin-bottom: 8px; }
ul.custom li::before { content: "▸"; position: absolute; left: 0; color: #b4552d; font-weight: 700; }
</style></head><body>
<div class="slide">
  <h1>Custom bullets</h1>
  <ul class="custom">
    <li>first point with a css-drawn marker</li>
    <li>second point, same marker</li>
    <li>third point</li>
  </ul>
</div>
</body></html>
