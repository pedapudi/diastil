<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Q3 Review</title>
<style>
  body { margin: 0; font-family: Helvetica, Arial, sans-serif; background: #222; }
  .slide { width: 960px; height: 540px; margin: 24px auto; background: white; padding: 48px; box-sizing: border-box; }
  h1 { font-size: 34px; color: #123; margin: 0 0 12px; }
  h2 { font-size: 24px; color: #123; }
  .subtitle { color: #b23; text-transform: uppercase; font-size: 12px; letter-spacing: 2px; }
  p, li { font-size: 15px; color: #445; line-height: 1.5; }
  .two-col { display: flex; gap: 30px; }
  .two-col > div { flex: 1; }
</style>
</head>
<body>
  <div class="slide">
    <div class="subtitle">Quarterly review</div>
    <h1>Q3 engineering review</h1>
    <p>Prepared by the platform team</p>
  </div>

  <div class="slide">
    <h2>Agenda</h2>
    <ul id="agenda"></ul>
    <script>
      // JS-built content: the list only exists after execution
      const items = ['Reliability', 'Latency program', 'Migration status', 'Q4 plan'];
      const ul = document.getElementById('agenda');
      for (const t of items) { const li = document.createElement('li'); li.textContent = t; ul.appendChild(li); }
    </script>
  </div>

  <div class="slide">
    <div class="two-col">
      <div>
        <h2>Service topology</h2>
        <p>Traffic enters through the gateway and fans out to three services.</p>
      </div>
      <div>
        <svg viewBox="0 0 300 220" width="100%">
          <rect x="110" y="10" width="80" height="34" rx="4" fill="#fff" stroke="#123"/>
          <text x="150" y="31" text-anchor="middle" font-size="11">gateway</text>
          <rect x="10" y="120" width="80" height="34" rx="4" fill="#fff" stroke="#123"/>
          <text x="50" y="141" text-anchor="middle" font-size="11">auth</text>
          <rect x="110" y="120" width="80" height="34" rx="4" fill="#fff" stroke="#123"/>
          <text x="150" y="141" text-anchor="middle" font-size="11">api</text>
          <rect x="210" y="120" width="80" height="34" rx="4" fill="#fff" stroke="#123"/>
          <text x="250" y="141" text-anchor="middle" font-size="11">billing</text>
          <line x1="130" y1="44" x2="55" y2="118" stroke="#123"/>
          <line x1="150" y1="44" x2="150" y2="118" stroke="#123"/>
          <line x1="170" y1="44" x2="245" y2="118" stroke="#123"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
