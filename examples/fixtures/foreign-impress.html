<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Roadmap tour</title>
<style>
  /* impress-shaped DOM: #impress with positioned .step slides */
  body { margin: 0; background: #2b2b33; font-family: Verdana, sans-serif; }
  #impress { position: relative; height: 100vh; overflow: hidden; }
  .step {
    position: absolute; left: 50%; top: 50%; width: 900px; height: 520px;
    margin: -260px 0 0 -450px; box-sizing: border-box; padding: 52px;
    background: #f4f2ec; color: #2b2b33;
  }
  .step h1 { font-size: 38px; margin: 0 0 14px; }
  .step p { font-size: 17px; line-height: 1.55; color: #55555f; }
  .impress-progress { position: fixed; bottom: 10px; left: 10px; color: #888; }
</style>
</head>
<body>
<div id="impress">
  <div class="step" data-x="0" data-y="0">
    <h1>Roadmap tour</h1>
    <p>Three stops: platform, editor, ecosystem.</p>
  </div>
  <div class="step" data-x="1200" data-y="300" data-rotate="15">
    <h1>Platform</h1>
    <p>Stable document core, versioned runtime, migration on open.</p>
  </div>
  <div class="step" data-x="2400" data-y="0">
    <h1>Ecosystem</h1>
    <p>Extractor plugins for every deck shape agents actually emit.</p>
  </div>
</div>
<div class="impress-progress">1/3</div>
</body>
</html>
