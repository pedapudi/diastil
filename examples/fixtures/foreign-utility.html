<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hiring update</title>
<style>
  /* utility-class soup (Tailwind-output-shaped, inlined so the fixture is
   * self-contained): meaning lives in computed styles, not class names */
  * { margin: 0; box-sizing: border-box; }
  body { background: #0f172a; font-family: ui-sans-serif, system-ui, sans-serif; }
  .w-slide { width: 960px; height: 540px; } .mx-auto { margin-left: auto; margin-right: auto; }
  .my-6 { margin-top: 24px; margin-bottom: 24px; } .p-12 { padding: 48px; }
  .bg-white { background: #fff; } .bg-slate-50 { background: #f8fafc; }
  .text-4xl { font-size: 36px; line-height: 1.2; } .text-sm { font-size: 14px; }
  .text-xs { font-size: 12px; } .text-lg { font-size: 18px; }
  .font-bold { font-weight: 700; } .uppercase { text-transform: uppercase; }
  .tracking-widest { letter-spacing: 0.1em; }
  .text-slate-900 { color: #0f172a; } .text-slate-500 { color: #64748b; } .text-rose-600 { color: #e11d48; }
  .mt-2 { margin-top: 8px; } .mt-6 { margin-top: 24px; } .flex { display: flex; } .gap-8 { gap: 32px; }
  .flex-1 { flex: 1; } .rounded { border-radius: 6px; } .border { border: 1px solid #e2e8f0; } .p-4 { padding: 16px; }
</style>
</head>
<body>
  <div class="w-slide mx-auto my-6 p-12 bg-white">
    <div class="text-xs uppercase tracking-widest text-rose-600 font-bold">People</div>
    <h1 class="text-4xl font-bold text-slate-900 mt-2">Hiring update</h1>
    <p class="text-sm text-slate-500 mt-2">June · recruiting sync</p>
  </div>
  <div class="w-slide mx-auto my-6 p-12 bg-white">
    <h1 class="text-4xl font-bold text-slate-900">Open roles</h1>
    <div class="flex gap-8 mt-6">
      <div class="flex-1 bg-slate-50 rounded border p-4">
        <div class="text-lg font-bold text-slate-900">Infra</div>
        <p class="text-sm text-slate-500 mt-2">2 senior SWE · 1 SRE — both loops calibrated.</p>
      </div>
      <div class="flex-1 bg-slate-50 rounded border p-4">
        <div class="text-lg font-bold text-slate-900">Product</div>
        <p class="text-sm text-slate-500 mt-2">1 designer · 1 PM — sourcing started this week.</p>
      </div>
    </div>
  </div>
  <div class="w-slide mx-auto my-6 p-12 bg-white">
    <h1 class="text-4xl font-bold text-slate-900">Pipeline</h1>
    <p class="text-sm text-slate-500 mt-6">38 active candidates; median time-in-stage is 6 days, down from 11 after the scheduling change.</p>
  </div>
</body>
</html>
